directory: "{{beets_library}}"
library: "{{beets_library}}/library.db"
asciify_paths: no
art_filename: cover
max_filename_length: 150
threaded: yes
original_date: yes
ui:
    color: yes
paths:
   default: '%lower{%asciify{${albumartist}/${album}/${track}__${albumartist}__${title}}}'
replace:
    '[\s]': _
    '[+$#<>:"\?!\*\|\(\),\.\\''-]':
    '[&]': 'and'
    '[\[\]]':
plugins:
    - fetchart
    - embedart
    - scrub
    - edit
    - zero
    - musicbrainz
    - lyrics
    - titlecase
    - convert
    - info
    - mbsync
fetchart:
    auto: yes
    cautious: yes
    minwidth: 1000
    maxwidth: 1000
    enforce_ratio: 10px
    cover_names:
        - cover
        - front
        - art
        - album
        - folder
    sources:
        - filesystem
        - lastfm
        - coverart
        - itunes
        - albumart
    quality: 95
    lastfm_key: {{beets_lastfm_key}}
embedart:
    auto: yes
    maxwidth: 1000
    quality: 95
scrub:
    auto: yes
import:
    timid: yes
    default_action: none
    detail: yes
    write: yes
    set_fields:
        genres: Rock
    incremental: no
    from_scratch: yes
format_item:
    '$albumartist | $artist | $artists | $artist_sort | $album | $year | $month | $day | $genres | $comments | $track | $title'
zero:
    auto: yes
    fields: comments month day
    update_database: yes
lyrics:
    auto: no
    dist_thresh: 0.11
    fallback: null
    force: no
    print: yes
    sources: [lrclib, genius, tekstowo]
    synced: yes
titlecase:
    auto: yes
    all_caps: yes 
    all_lowercase: yes
    replace:
        - "’": "'"
        - "‘": "'"
        - "“": '"'
        - "”": '"'
    fields:
        - album
        - title
        - albumartist
        - albumartist_credit
        - albumartist_sort
        - albumartists
        - albumartists_credit
        - albumartists_sort
        - artist
        - artist_credit
        - artist_sort
        - artists
        - artists_credit
        - artists_sort
convert:
    auto: no
    copy_album_art: yes
    embed: yes
    never_convert_lossy_files: yes
    format: opus
    dest: /tmp/convert
    write_metdata: true
    album_art_maxwidth: 1000
edit:
    itemfields: track title album albumartist albumartist_credit albumartist_sort albumartists albumartists_credit albumartists_sort artist artist_credit artist_sort artists artists_credit artists_sort
